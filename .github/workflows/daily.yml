name: Daily Video Autopilot

# Runs the pipeline on a schedule (free, no server needed) and on a manual button.
on:
  schedule:
    # 09:00 UTC every day. GitHub cron is UTC; adjust to your timezone.
    # Scheduled runs may be delayed a few minutes under load — fine for daily videos.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do NOT post (overrides settings.yaml)"
        type: boolean
        default: true
      channel:
        description: "Single channel key (leave blank to run ALL channels)"
        type: string
        default: ""

# Needed so the job can commit the updated topic-history back to the repo.
permissions:
  contents: write

# Don't let two runs collide on the history commit.
concurrency:
  group: video-autopilot
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-${{ runner.os }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Add whichever you use as repo Secrets (Settings → Secrets → Actions).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOAD_POST_USER: ${{ secrets.UPLOAD_POST_USER }}
        run: |
          DRY=""
          # Manual runs honor the dry_run checkbox; scheduled runs use settings.yaml.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi
          if [ -n "${{ inputs.channel }}" ]; then
            python -m src.orchestrator --channel "${{ inputs.channel }}" --count 1 $DRY
          else
            python -m src.orchestrator --all $DRY
          fi

      - name: Persist topic history (anti-repeat memory)
        if: always()
        run: |
          git config user.name "video-autopilot[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f output/history.json 2>/dev/null || true
          git commit -m "chore: update topic history [skip ci]" || echo "no history changes"
          git push || echo "nothing to push"

      - name: Upload built videos (review for dry-runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: |
            output/**/final.mp4
            output/**/metadata.json
          if-no-files-found: ignore
          retention-days: 7
